name: Download FileBrowser v2.61.1 Tar

on:
  workflow_dispatch:  # 允许手动触发

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (optional)
        uses: actions/checkout@v3

      - name: Pull FileBrowser v2.61.1 image
        run: |
          docker pull filebrowser/filebrowser:v2.61.1

      - name: Save image as tar
        run: |
          docker save filebrowser/filebrowser:v2.61.1 -o filebrowser-v2.61.1.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: filebrowser-v2.61.1-tar
          path: filebrowser-v2.61.1.tar
