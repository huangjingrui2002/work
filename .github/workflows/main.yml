name: Download Nacos v3.1.1 Tar

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (optional)
        uses: actions/checkout@v3

      - name: Pull Nacos Server v3.1.1
        run: |
          docker pull nacos/nacos-server:v3.1.1

      - name: Save image as tar
        run: |
          docker save nacos/nacos-server:v3.1.1 -o nacos-v3.1.1.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nacos-v3.1.1-tar
          path: nacos-v3.1.1.tar
