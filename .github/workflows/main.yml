name: Download Nacos v3.1.1 ARM64 Tar

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (optional, but good practice)
        uses: actions/checkout@v3

      - name: Set up Docker Buildx (enables multi-platform support)
        uses: docker/setup-buildx-action@v3

      - name: Pull Nacos Server v3.1.1 for ARM64
        run: |
          # Pull the image for linux/arm64 platform
          docker pull --platform linux/arm64 nacos/nacos-server:v3.1.1
          # Optional: tag it for clarity
          docker tag nacos/nacos-server:v3.1.1 nacos-server:v3.1.1-arm64

      - name: Save Nacos image as tar
        run: |
          docker save nacos-server:v3.1.1-arm64 -o nacos-v3.1.1-arm64.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nacos-v3.1.1-arm64-tar
          path: nacos-v3.1.1-arm64.tar
